# Daily scrape -> commit DB -> health digest.
# Data-in-git pattern: the SQLite file lives in the repo, so storage,
# scheduling, and "deployment" are all free GitHub primitives. Zero servers.
name: daily-scrape

on:
  schedule:
    - cron: "30 2 * * *" # 08:00 IST daily
  workflow_dispatch: {}

permissions:
  contents: write # commit the updated DB
  issues: write # open an alert issue when health check goes red

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      # Scrapers run independently: one source breaking must not block the
      # others, so each step has continue-on-error and health_check.py is
      # the single arbiter of red/green.
      - name: Scrape BSE announcements
        continue-on-error: true
        run: python scrapers/bse.py

      - name: Triage BSE announcements into tenders/deployments
        continue-on-error: true
        run: python pipeline/triage.py

      - name: Scrape CESL tenders
        continue-on-error: true
        run: python scrapers/cesl.py

      - name: Scrape CPPP tenders + corrigenda
        continue-on-error: true
        run: python scrapers/cppp.py

      # Vahan geo-blocks non-Indian IPs; this step is expected to fail on
      # GitHub runners. Run vahan_local.sh from your Mac via launchd instead.
      - name: Scrape Vahan registrations (Indian IP required)
        continue-on-error: true
        run: python scrapers/vahan.py || echo "::warning::Vahan skipped (geo-block expected on GH runners — use launchd on Mac)"

      # Regenerate the JSON the site builds from, so scraped changes actually
      # reach the site (the Astro build reads site/src/data/*.json, not the DB).
      - name: Regenerate site JSON from DB
        run: |
          python pipeline/export_json.py
          python pipeline/merge_site_data.py

      - name: Commit updated DB + regenerated site JSON
        run: |
          git config user.name "evbus-bot"
          git config user.email "actions@users.noreply.github.com"
          # Gate the commit on the JSON, not the .db. Exported JSON is a pure
          # function of the DB's *data*, so it differs only on a real change.
          # data/evbus.db can churn from SQLite WAL/checkpoint on a read-only
          # open (get_db runs PRAGMA journal_mode = WAL), which would otherwise
          # produce empty "data" commits. Staging JSON first and testing it
          # means binary-only churn never commits.
          git add site/src/data/*.json
          if git diff --cached --quiet; then
            echo "No data change — skipping commit (daily-rebuild.yml keeps the site date fresh)."
          else
            git add data/evbus.db
            git commit -m "data: daily scrape $(date -u +%F)"
            git push
          fi

      - name: Health-check digest
        id: digest
        run: |
          set +e
          python pipeline/health_check.py | tee digest.md
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          cat digest.md >> "$GITHUB_STEP_SUMMARY"

      - name: Open alert issue on critical
        if: steps.digest.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue list --label health-alert --state open --json number -q '.[0].number' > existing.txt
          if [ -s existing.txt ]; then
            gh issue comment "$(cat existing.txt)" --body-file digest.md
          else
            gh issue create --title "🔴 Scraper health alert $(date -u +%F)" \
              --label health-alert --body-file digest.md
          fi
